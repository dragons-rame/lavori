<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Anagrafica da CSV</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    #container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .card {
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 15px;
      background: #f9f9f9;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      transition: transform 0.2s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .field {
      margin-bottom: 5px;
    }

    .label {
      font-weight: bold;
    }
  </style>
</head>
<body>

<h2>Carica file CSV anagrafica</h2>
<input type="file" id="fileInput" accept=".csv">

<div id="container"></div>

<script>
document.getElementById("fileInput").addEventListener("change", handleFile);

function handleFile(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = function(e) {
    const text = e.target.result;
    const data = parseCSV(text);
    renderRecursive(data, 0);
  };

  reader.readAsText(file);
}

// Parsing CSV semplice
function parseCSV(text) {
  const lines = text.split("\n").filter(line => line.trim() !== "");
  const headers = lines[0].split(",");

  return lines.slice(1).map(line => {
    const values = line.split(",");
    let obj = {};
    headers.forEach((header, i) => {
      obj[header.trim()] = values[i]?.trim();
    });
    return obj;
  });
}

// Funzione ricorsiva per renderizzare i blocchi
function renderRecursive(data, index) {
  if (index >= data.length) return;

  const container = document.getElementById("container");
  const card = createCard(data[index]);
  container.appendChild(card);

  // chiamata ricorsiva
  renderRecursive(data, index + 1);
}

// Creazione singolo blocco
function createCard(item) {
  const div = document.createElement("div");
  div.className = "card";

  for (let key in item) {
    const field = document.createElement("div");
    field.className = "field";

    const label = document.createElement("span");
    label.className = "label";
    label.textContent = key + ": ";

    const value = document.createElement("span");
    value.textContent = item[key];

    field.appendChild(label);
    field.appendChild(value);
    div.appendChild(field);
  }

  return div;
}
</script>

</body>
</html>
