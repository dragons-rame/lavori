<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Anagrafica CSV</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: linear-gradient(135deg, #eef2f7, #dbe6f6);
      min-height: 100vh;
      padding: 20px;
      color: #333;
    }

    h2 {
      margin-bottom: 15px;
    }

    .header {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
      background: white;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    input[type="file"] {
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #ccc;
      cursor: pointer;
      background: #f8f9fb;
      transition: all 0.2s;
    }

    input[type="file"]:hover {
      background: #eef3ff;
      border-color: #7aa2ff;
    }

    #container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 15px;
      padding: 18px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.08);
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      height: 5px;
      width: 100%;
      background: linear-gradient(90deg, #6a85ff, #4cc9f0);
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 25px rgba(0,0,0,0.15);
    }

    .field {
      margin-bottom: 8px;
      font-size: 14px;
      display: flex;
      flex-wrap: wrap;
    }

    .label {
      font-weight: 600;
      color: #555;
      margin-right: 5px;
    }

    .value {
      color: #222;
    }

    /* Responsive extra */
    @media (max-width: 500px) {
      body {
        padding: 10px;
      }

      .header {
        padding: 10px;
      }

      .card {
        padding: 15px;
      }
    }
  </style>
</head>
<body>

<div class="header">
  <h2> Carica anagrafica CSV</h2>
  <input type="file" id="fileInput" accept=".csv">
</div>

<div id="container"></div>

<script>
document.getElementById("fileInput").addEventListener("change", handleFile);

function handleFile(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = function(e) {
    const text = e.target.result;
    const data = parseCSV(text);

    document.getElementById("container").innerHTML = ""; // reset
    renderRecursive(data, 0);
  };

  reader.readAsText(file);
}

function parseCSV(text) {
  const lines = text.split("\n").filter(line => line.trim() !== "");
  const headers = lines[0].split(",");

  return lines.slice(1).map(line => {
    const values = line.split(",");
    let obj = {};
    headers.forEach((header, i) => {
      obj[header.trim()] = values[i]?.trim();
    });
    return obj;
  });
}

// Ricorsione
function renderRecursive(data, index) {
  if (index >= data.length) return;

  const container = document.getElementById("container");
  const card = createCard(data[index]);
  container.appendChild(card);

  requestAnimationFrame(() => {
    renderRecursive(data, index + 1);
  });
}

function createCard(item) {
  const div = document.createElement("div");
  div.className = "card";

  for (let key in item) {
    const field = document.createElement("div");
    field.className = "field";

    const label = document.createElement("span");
    label.className = "label";
    label.textContent = key + ":";

    const value = document.createElement("span");
    value.className = "value";
    value.textContent = " " + item[key];

    field.appendChild(label);
    field.appendChild(value);
    div.appendChild(field);
  }

  return div;
}
</script>

</body>
</html>
