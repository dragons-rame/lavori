<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Piattaforma E-Commerce Semplice - EUR</title>
    <!-- Libreria per il PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        /* --- CSS BASE E RESPONSIVE --- */
        :root { --colore-scelto: #007bff; }
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
        .intestazione { background: var(--colore-scelto); color: white; padding: 15px; text-align: center; margin-bottom: 20px; }
        
        /* Layout a tre zone principali */
        .sezione { background: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        /* Griglia dei prodotti responsive */
        .griglia { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 15px; }
        .card { border: 1px solid #ddd; padding: 15px; border-radius: 5px; text-align: center; background: #fff; display: flex; flex-direction: column; justify-content: space-between; }
        .card img { width: 100%; height: 150px; object-fit: cover; border-radius: 4px; }
        
        /* Pulsanti */
        button { background: var(--colore-scelto); color: white; border: none; padding: 8px 12px; margin: 5px 0; cursor: pointer; border-radius: 4px; font-weight: bold; width: 100%; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .btn-rimuovi { background: #dc3545; padding: 2px 6px; font-size: 0.8rem; width: auto; margin: 0; }
        .btn-stampa { background: #28a745; width: 100%; padding: 12px; font-size: 1.1rem; margin-top: 10px; }
        
        .elemento-carrello { display: flex; justify-content: space-between; align-items: center; margin: 8px 0; border-bottom: 1px solid #eee; padding-bottom: 5px; }
    </style>
</head>
<body>

    <div class="intestazione">
        <h1 id="titoloStore">Negozio Online Universale</h1>
    </div>

    <!-- 1. AREA CONFIGURAZIONE (ini.html integrata) -->
    <div class="sezione">
        <h2>1. Configurazione Piattaforma</h2>
        <label>Carica File CSV: </label>
        <input type="file" id="inputCsv" accept=".csv">
        <label style="margin-left: 20px;">Colore Grafica: </label>
        <input type="color" id="inputColore" value="#007bff">
        <button id="btnConfigura" style="width: auto; padding: 8px 20px; margin-left: 10px;">Applica Impostazioni</button>
    </div>

    <!-- 2. AREA VETRINA PRODOTTI -->
    <div class="sezione">
        <h2>2. Catalogo Prodotti</h2>
        <div id="spazioProdotti" class="griglia">
            <p style="color: #888;">Carica un file CSV sopra per visualizzare la merce del venditore...</p>
        </div>
    </div>

    <!-- 3. AREA BASKET (CARRELLO) -->
    <div class="sezione" style="max-width: 450px;">
        <h2>3. Il Tuo Basket (Carrello)</h2>
        <div id="spazioCarrello">
            <p style="color: #888;">Il carrello è vuoto.</p>
        </div>
        <h3 style="text-align: right; margin-top: 15px;">Totale da Pagare: <span id="testoTotale" style="color: #28a745;">0.00 €</span></h3>
        <button id="btnAcquista" class="btn-stampa" disabled>Perfeziona Pagamento ed Estrai PDF</button>
    </div>

    <!-- --- LOGICA JAVASCRIPT TRADIZIONALE --- -->
    <script>
        var prodotti = []; // Contiene i prodotti estratti dal CSV
        var carrello = []; // Contiene gli elementi aggiunti al carrello

        // 1. GESTIONE CONFIGURAZIONE
        document.getElementById('btnConfigura').addEventListener('click', function() {
            var fileInput = document.getElementById('inputCsv');
            var colore = document.getElementById('inputColore').value;

            // Aggiorna la variabile CSS per cambiare stile istantaneamente
            document.documentElement.style.setProperty('--colore-scelto', colore);

            if (fileInput.files.length === 0) {
                alert("Attenzione: Seleziona prima un file CSV per popolare lo store!");
                return;
            }

            var lettore = new FileReader();
            lettore.onload = function(e) {
                var testoCSV = e.target.result;
                parserizzaNuovoCSV(testoCSV);
            };
            lettore.readAsText(fileInput.files[0]);
        });

        // Parser del file CSV
        function parserizzaNuovoCSV(testo) {
            prodotti = []; 
            var righe = testo.split('\n');

            // Salta la riga 0 delle intestazioni
            for (var i = 1; i < righe.length; i++) {
                var riga = righe[i].trim();
                if (riga === '') continue; 

                var colonne = riga.split(',');
                if (colonne.length >= 5) {
                    prodotti.push({
                        id: i - 1,
                        marca: colonne[0].trim(),
                        modello: colonne[1].trim(),
                        descrizione: colonne[2].trim(),
                        immagine: colonne[3].trim(),
                        prezzo: parseFloat(colonne[4].trim())
                    });
                }
            }
            mostraProdottiInVetrina();
        }

        // 2. RENDERING DELLA VETRINA (Concatenazione classica con il "+")
        function mostraProdottiInVetrina() {
            var contenitore = document.getElementById('spazioProdotti');
            contenitore.innerHTML = ''; 

            for (var i = 0; i < prodotti.length; i++) {
                var p = prodotti[i];
                
                // Costruiamo la card unendo i testi con il + senza usare i dollari di JS
                var htmlCard = '<div class="card">' +
                    '<img src="' + p.immagine + '" alt="Immagine Prodotto">' +
                    '<h3 style="margin: 10px 0 5px 0;">' + p.marca + '</h3>' +
                    '<h4 style="color: #555; margin: 0 0 10px 0;">' + p.modello + '</h4>' +
                    '<p style="font-size: 1.3rem; font-weight: bold; margin: 5px 0; color: #28a745;">' + p.prezzo.toFixed(2) + ' €</p>' +
                    '<button onclick="mostraDettaglio(' + p.id + ')" style="background: #6c757d;">Vedi Caratteristiche</button>' +
                    '<button onclick="aggiungiAlCarrello(' + p.id + ')">Aggiungi al Basket</button>' +
                '</div>';
                
                contenitore.innerHTML += htmlCard;
            }
        }

        // Cerca un prodotto nell'array tramite ciclo for classico
        function cercaProdottoPerId(id) {
            for (var i = 0; i < prodotti.length; i++) {
                if (prodotti[i].id === id) {
                    return prodotti[i];
                }
            }
            return null;
        }

        // Mostra le caratteristiche del prodotto (Finestra di dettaglio)
        function mostraDettaglio(id) {
            var p = cercaProdottoPerId(id);
            if (p) {
                alert("SCHEDA DETTAGLIATA PRODOTTO\n\n• Marca: " + p.marca + "\n• Modello: " + p.modello + "\n• Prezzo: " + p.prezzo.toFixed(2) + " €\n\nDescrizione Tecnica:\n" + p.descrizione);
            }
        }

        // 3. GESTIONE DEL BASKET
        function aggiungiAlCarrello(id) {
            var p = cercaProdottoPerId(id);
            if (p) {
                carrello.push(p);
                aggiornaGraficaCarrello();
            }
        }

        function rimuoviDalCarrello(indice) {
            carrello.splice(indice, 1);
            aggiornaGraficaCarrello();
        }

        function aggiornaGraficaCarrello() {
            var spazio = document.getElementById('spazioCarrello');
            var totaleDoc = document.getElementById('testoTotale');
            var btnAcquista = document.getElementById('btnAcquista');

            if (carrello.length === 0) {
                spazio.innerHTML = '<p style="color: #888;">Il carrello è vuoto.</p>';
                totaleDoc.innerText = '0.00 €';
                btnAcquista.disabled = true;
                return;
            }

            spazio.innerHTML = '';
            var totale = 0;

            for (var i = 0; i < carrello.length; i++) {
                var p = carrello[i];
                totale += p.prezzo;
                
                var htmlElemento = '<div class="elemento-carrello">' +
                    '<span><strong>' + p.marca + '</strong> ' + p.modello + ' (' + p.prezzo.toFixed(2) + ' €)</span>' +
                    '<button class="btn-rimuovi" onclick="rimuoviDalCarrello(' + i + ')">Rimuovi</button>' +
                '</div>';
                
                spazio.innerHTML += htmlElemento;
            }

            totaleDoc.innerText = totale.toFixed(2) + ' €';
            btnAcquista.disabled = false;
        }

        // 4. PERFEZIONAMENTO ACQUISTO E STAMPA PDF
        document.getElementById('btnAcquista').addEventListener('click', function() {
            var jsPDF = window.jspdf.jsPDF;
            var doc = new jsPDF();

            doc.setFont("Helvetica", "bold");
            doc.setFontSize(20);
            doc.text("RICEVUTA DI PAGAMENTO - EURO", 20, 20);
            
            doc.setFont("Helvetica", "normal");
            doc.setFontSize(11);
            doc.text("Data Operazione: " + new Date().toLocaleDateString() + " alle " + new Date().toLocaleTimeString(), 20, 30);
            doc.text("Transazione completata con successo tramite piattaforma client.", 20, 37);
            doc.text("-----------------------------------------------------------------------------------------------------", 20, 45);

            var y = 55;
            var totaleCompleto = 0;

            for (var i = 0; i < carrello.length; i++) {
                var p = carrello[i];
                doc.text((i + 1) + ". " + p.marca + " " + p.modello, 20, y);
                doc.text(p.prezzo.toFixed(2) + " EUR", 160, y);
                totaleCompleto += p.prezzo;
                y += 10;
            }

            doc.text("-----------------------------------------------------------------------------------------------------", 20, y);
            y += 10;
            
            doc.setFont("Helvetica", "bold");
            doc.setFontSize(14);
            doc.text("TOTALE CORRISPOSTO:", 20, y);
            doc.text(totaleCompleto.toFixed(2) + " EUR", 160, y);

            doc.save("ricevuta_pagamento_eur.pdf");

            alert("Pagamento in Euro ricevuto! Ricevuta scaricata.");
            carrello = [];
            aggiornaGraficaCarrello();
        });
    </script>
</body>
</html>
