<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini E-commerce CSV</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background-color: #f4f4f4;
}

header {
  background-color: #333;
  color: white;
  padding: 15px;
  text-align: center;
}

.container {
  padding: 20px;
}

h2 {
  margin-top: 30px;
}

/* prodotti */
#products, #cart {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
}

/* card */
.card {
  background-color: white;
  border-radius: 10px;
  padding: 10px;
  width: 200px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.2);
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.03);
}

.card img {
  width: 100%;
  border-radius: 10px;
}

/* bottoni */
button {
  margin-top: 8px;
  padding: 8px;
  border: none;
  background-color: #007BFF;
  color: white;
  border-radius: 5px;
}

button:hover {
  background-color: #0056b3;
}

/* dettaglio */
#detail {
  background-color: white;
  padding: 15px;
  border-radius: 10px;
  max-width: 400px;
}

input {
  padding: 5px;
}
</style>
</head>

<body>

<header>
  <h1>Mini Shop</h1>
</header>

<div class="container">

<h3>Carica file CSV</h3>
<input type="file" id="csvFile">
<button onclick="loadFile()">Carica</button>

<hr>

<h2>Prodotti</h2>
<div id="products"></div>

<hr>

<h2>Dettaglio</h2>
<div id="detail"></div>

<hr>

<h2>Carrello</h2>
<div id="cart"></div>
<button onclick="makePDF()">Stampa PDF</button>

</div>

<!-- LIBRERIA PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
var products = [];
var cart = [];

// carica file
function loadFile() {
  var file = document.getElementById("csvFile").files[0];
  var reader = new FileReader();

  reader.onload = function(e) {
    parseCSV(e.target.result);
  };

  reader.readAsText(file);
}

// parse CSV
function parseCSV(text) {
  var rows = text.split("\n");
  var headers = rows[0].split(",");

  products = [];

  for (var i = 1; i < rows.length; i++) {
    if (rows[i].trim() === "") continue;

    var cols = rows[i].split(",");
    var obj = {};

    for (var j = 0; j < headers.length; j++) {
      obj[headers[j].trim()] = cols[j];
    }

    products.push(obj);
  }

  showProducts();
}

// mostra prodotti
function showProducts() {
  var div = document.getElementById("products");
  div.innerHTML = "";

  for (var i = 0; i < products.length; i++) {
    var p = products[i];

    div.innerHTML +=
      "<div class='card'>" +
      "<img src='" + p.immagine + "'>" +
      "<h3>" + p.marca + " " + p.modello + "</h3>" +
      "<p>" + p.prezzo + " €</p>" +
      "<button onclick='showDetail(" + i + ")'>Dettagli</button>" +
      "</div>";
  }
}

// dettaglio
function showDetail(i) {
  var p = products[i];

  document.getElementById("detail").innerHTML =
    "<h3>" + p.marca + " " + p.modello + "</h3>" +
    "<img src='" + p.immagine + "'>" +
    "<p>" + p.descrizione + "</p>" +
    "<p><b>" + p.prezzo + " €</b></p>" +
    "<button onclick='addToCart(" + i + ")'>Aggiungi al carrello</button>";
}

// aggiungi carrello
function addToCart(i) {
  cart.push(products[i]);
  showCart();
}

// mostra carrello
function showCart() {
  var div = document.getElementById("cart");
  div.innerHTML = "";

  for (var i = 0; i < cart.length; i++) {
    var p = cart[i];

    div.innerHTML +=
      "<div class='card'>" +
      "<p>" + p.marca + " " + p.modello + "</p>" +
      "<p>" + p.prezzo + " €</p>" +
      "</div>";
  }
}

// PDF
function makePDF() {
  var jsPDFLib = window.jspdf;
  var doc = new jsPDFLib.jsPDF();

  var y = 10;

  for (var i = 0; i < cart.length; i++) {
    var p = cart[i];
    doc.text(p.marca + " " + p.modello + " - " + p.prezzo + "€", 10, y);
    y += 10;
  }

  doc.save("carrello.pdf");
}
</script>

</body>
</html>
